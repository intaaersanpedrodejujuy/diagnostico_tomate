```html
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Diagnóstico de Enfermedades del Tomate
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

    <!-- IMPORTANTE -->
    <!-- defer evita que el JS se ejecute -->
    <!-- antes de cargar el HTML -->
    <script
        src="script.js"
        defer
    ></script>

</head>

<body>

    <div class="container">

        <h1>
            Diagnóstico de Enfermedades del Tomate
        </h1>

        <!-- ================================= -->
        <!-- LOCALIZACION -->
        <!-- ================================= -->

        <section>

            <label for="select-localizacion">
                Parte de la planta
            </label>

            <select id="select-localizacion">

                <option>
                    Cargando datos...
                </option>

            </select>

        </section>

        <!-- ================================= -->
        <!-- SINTOMAS -->
        <!-- ================================= -->

        <section
            id="sec-sintomas"
            class="hidden"
        >

            <label for="select-sintoma">
                Síntoma observado
            </label>

            <select id="select-sintoma">

                <option value="">
                    Seleccione un síntoma...
                </option>

            </select>

        </section>

        <!-- ================================= -->
        <!-- SIGNOS -->
        <!-- ================================= -->

        <section
            id="sec-signos"
            class="hidden"
        >

            <label for="select-signo">
                Signos observados
            </label>

            <select id="select-signo">

                <option value="NINGUNO">
                    Ninguno / No se observa
                </option>

            </select>

        </section>

        <!-- ================================= -->
        <!-- RESULTADO -->
        <!-- ================================= -->

        <section
            id="resultado"
            class="hidden"
        >

            <h2 id="diag-nombre">
                Diagnóstico
            </h2>

            <p id="diag-agente"></p>

            <h3>
                Manejo sugerido
            </h3>

            <p id="diag-manejo"></p>

            <div id="alerta-seguridad"></div>

        </section>

    </div>

</body>

</html>
```
