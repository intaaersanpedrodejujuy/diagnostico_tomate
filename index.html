<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diagnóstico de Enfermedades - Tomate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Guía de Consulta: Enfermedades del Tomate</h1>
    
    <div id="app">
        <section>
            <label>1. ¿Dónde observa el daño?</label>
            <select id="select-localizacion">
                <option value="">Seleccione parte de la planta...</option>
            </select>
        </section>

        <section id="sec-sintomas" class="hidden">
            <label>2. ¿Qué síntoma presenta?</label>
            <select id="select-sintoma">
                <option value="">Seleccione un síntoma...</option>
            </select>
        </section>

        <section id="sec-signos" class="hidden">
            <label>3. ¿Observa algún signo (moho, polvo, etc.)?</label>
            <select id="select-signo">
                <option value="">Ninguno / No se observa</option>
            </select>
        </section>

        <hr>

        <div id="resultado" class="hidden">
            <h2>Diagnóstico Sugerido</h2>
            <p id="diag-nombre"></p>
            <p id="diag-agente"></p>
            <h3>Recomendación de Manejo</h3>
            <p id="diag-manejo"></p>
            <div id="alerta-seguridad"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
